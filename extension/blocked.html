<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blocked by MonoFocus</title>
    <link rel="stylesheet" href="blocked.css" />
  </head>
  <body>
    <main>
      <span class="mark" aria-hidden="true"></span>
      <p class="eyebrow">MonoFocus</p>
      <h1>Back to your focus session.</h1>
      <p class="description">
        This website is temporarily unavailable because it is on your active
        MonoFocus blocklist.
      </p>
      <button type="button" id="back-button">Go back</button>
    </main>
    <script src="blocked.js"></script>
  </body>
</html>
